<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Динозаврик из Хрома</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div id="game-container">
        <div id="score-board" style="display: none;">Счет: <span id="score">0</span></div>
        <canvas id="gameCanvas"></canvas>
        <div id="start-screen">
            <h1 class="start-title">DINO RUNNER</h1>
            <p class="start-subtitle">Press Space to start the game</p>
            <img src="assets/Chrome_T-Rex_Left_Run.webp" class="start-dino" alt="Dino">
            <img src="assets/cactus5.png" class="start-cactus" alt="Cactus">
        </div>
        <div id="game-over">
            <h1>ИГРА ОКОНЧЕНА</h1>
            <p>Нажми Пробел, чтобы начать заново</p>
        </div>
    </div>

    <!-- Подключаем скрипты в правильном порядке -->
    <script src="js/sound.js"></script>
    <script src="js/input.js"></script>
    <script src="js/score.js"></script>
    <script src="js/dino.js"></script>
    <script src="js/cactus.js"></script>
    <script src="js/cloud.js"></script>
    <script src="js/main.js"></script>
</body>
</html>
